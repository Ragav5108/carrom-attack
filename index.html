<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carrom Golf 1v1</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --wood-color: #d4a373;
            --border-color: #5c3a21;
            --ui-bg: rgba(0, 0, 0, 0.8);
            --p1-color: #FF6B6B;
            --p2-color: #4ECDC4;
            --win-color: #00b894;
            --online-color: #6C5CE7;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
            font-family: 'Fredoka', 'Segoe UI', sans-serif;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--ui-bg);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
            animation: fadeIn 0.3s ease;
        }

        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none !important; }

        h1 { margin-bottom: 20px; font-size: 2.5rem; text-align: center; color: #fca311; text-transform: uppercase; }
        h2 { margin: 10px 0; color: white; }
        
        .cartoon-btn {
            display: block;
            width: 250px;
            padding: 15px;
            margin: 10px;
            border: 3px solid #333;
            border-radius: 15px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            color: white;
            background: #fca311;
            box-shadow: 5px 5px 0px #333;
            transition: transform 0.1s;
        }
        .cartoon-btn:active { transform: translate(2px, 2px); box-shadow: 3px 3px 0px #333; }
        .cartoon-btn:disabled { background: #666; box-shadow: none; cursor: not-allowed; transform: none; }
        
        .btn-online { background: var(--online-color); box-shadow: 5px 5px 0px #4834d4; }
        .btn-back { background: #95a5a6; box-shadow: 5px 5px 0px #7f8c8d; }
        .btn-share { background: #25D366; box-shadow: 5px 5px 0px #128C7E; }
        .btn-copy { background: #636e72; box-shadow: 5px 5px 0px #2d3436; }
        .btn-restart { background: var(--win-color); box-shadow: 5px 5px 0px #008f72; }

        .card {
            background: rgba(255,255,255,0.1);
            border: 3px solid #fca311;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .room-id-box {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border: 2px dashed #fca311;
            border-radius: 10px;
            font-family: monospace;
            font-size: 1.4rem;
            margin: 15px 0;
            word-break: break-all;
            font-weight: bold;
            color: #fca311;
        }
        
        .input-group { display: flex; gap: 5px; margin: 15px 0; }
        input { 
            flex: 1; 
            padding: 12px; 
            border: 3px solid #fca311; 
            border-radius: 10px; 
            font-family: 'Fredoka', sans-serif; 
            font-size: 1.1rem; 
            text-align: center; 
            outline: none;
            background: rgba(255,255,255,0.9);
        }
        input:focus { border-color: var(--online-color); }

        .connection-status {
            font-size: 0.9rem;
            color: #aaa;
            margin-top: 10px;
            font-style: italic;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
        }
        #game-container.active { display: flex; }

        canvas {
            background-color: var(--wood-color);
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            border: 20px solid var(--border-color);
            border-radius: 15px;
            max-width: 95vw;
            max-height: 95vh;
            aspect-ratio: 500 / 707;
            image-rendering: crisp-edges;
        }

        #hud {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            pointer-events: none;
            color: white;
            font-weight: bold;
            font-size: 1.8rem;
            text-shadow: 2px 2px 0 #000;
        }

        #turn-indicator {
            position: absolute;
            bottom: 25px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 1.4rem;
            text-shadow: 1px 1px 0 #000;
            pointer-events: none;
        }

        #timer-display {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 12px 25px;
            border-radius: 25px;
            color: #fca311;
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000;
        }

        .timer-warning {
            color: #e63946 !important;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .online-controls {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 8px;
            z-index: 20;
        }
        
        .icon-btn {
            width: 50px;
            height: 50px;
            padding: 0;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #333;
            color: white;
            border: 2px solid #fca311;
        }

        .icon-btn:active {
            background: #fca311;
            color: black;
        }

        .pocket-effect {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #fca311 50%, transparent 70%);
            animation: pocketPop 0.3s ease-out;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes pocketPop {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .thinking-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
        
        .bonus-flash {
            animation: bonusGlow 0.4s ease-out;
        }
        
        @keyframes bonusGlow {
            0% { box-shadow: 0 0 0 0 rgba(252, 163, 17, 0.8); }
            100% { box-shadow: 0 0 0 20px rgba(252, 163, 17, 0); }
        }

        .warning-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #e74c3c;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            border: 3px solid #333;
            font-weight: bold;
            z-index: 200;
            display: none;
            box-shadow: 5px 5px 0px #333;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown { from { top: -50px; } to { top: 20px; } }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }
        .modal.active { display: flex; }
        
        .modal-content {
            background: white;
            border: 4px solid #333;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 15px 15px 0px #333;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%;
            width: 350px;
        }
        @keyframes popIn { from { transform: scale(0.5) rotate(-10deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="warning-toast" class="warning-toast">⚠️ Not your turn!</div>

    <div id="menu-screen" class="screen active">
        <div class="card">
            <h1>🎯 CARROM GOLF</h1>
            <p style="font-size: 1.1rem; margin: 15px 0 25px 0; color: #ccc;">Touch the target when you stop!</p>
            <button class="cartoon-btn" onclick="startGame('local')">Local 1vs1</button>
            <button class="cartoon-btn" onclick="startGame('computer')">Vs Computer</button>
            <button class="cartoon-btn btn-online" onclick="showLobby()">🌍 Play Online</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <div class="card">
            <h2>Online Lobby</h2>
            
            <button class="cartoon-btn btn-online" id="btn-create" onclick="createRoom()">🏠 Create Room</button>
            
            <div id="create-result" style="display:none; margin-top: 20px; animation: fadeIn 0.5s;">
                <p style="margin:0; font-weight:bold; color:white;">Share this ID with your friend:</p>
                <div class="room-id-box" id="my-room-id">...</div>
                <div style="display:flex; gap:10px;">
                    <button class="cartoon-btn btn-share" style="flex:1" onclick="shareRoomId()">📤 Share</button>
                    <button class="cartoon-btn btn-copy" style="flex:1" onclick="copyRoomId()">📋 Copy</button>
                </div>
                <p class="connection-status" id="host-status">Waiting for player...</p>
            </div>

            <div style="margin: 25px 0; border-bottom: 2px dashed #666; width: 100%;"></div>

            <h3 style="color:white;">Join Room</h3>
            <div class="input-group">
                <input type="text" id="join-id-input" placeholder="Paste Room ID here">
                <button class="cartoon-btn btn-online" style="width:auto; margin:0;" onclick="joinRoom()">Join</button>
            </div>
            <p class="connection-status" id="join-status"></p>

            <button class="cartoon-btn btn-back" onclick="goHome()">Back to Home</button>
        </div>
    </div>

    <div id="game-over-screen" class="screen">
        <div class="modal-content">
            <h1 style="color: var(--win-color); font-size: 3rem; margin: 0;">🏆 WINNER!</h1>
            <h2 id="winner-text" style="margin: 15px 0; color: #333;">Player 1 WINS!</h2>
            <button class="cartoon-btn btn-restart" onclick="restartGame()">🔄 Play Again</button>
            <button class="cartoon-btn btn-back" onclick="goHome()">Exit to Menu</button>
        </div>
    </div>

    <div id="game-container">
        <div class="online-controls hidden" id="online-ui">
            <button class="icon-btn" onclick="copyRoomId()" title="Copy ID">📋</button>
            <button class="icon-btn" onclick="shareRoomId()" title="Share ID">📤</button>
        </div>

        <div id="hud">
            <div id="p1-score" style="color: var(--p1-color);">P1: 0</div>
            <div id="p2-score" style="color: var(--p2-color);">P2: 0</div>
        </div>

        <div id="timer-display">30</div>
        <div id="turn-indicator">Player 1's Turn</div>
        
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="modal" id="win-modal">
        <div class="modal-content">
            <h1 style="color: var(--win-color); font-size: 4rem; margin: 0; line-height: 1;">🎉 WINNER!</h1>
            <h2 id="winner-name" style="margin-top: 10px; color: #333;">Player 1 Wins!</h2>
            <button class="cartoon-btn btn-restart" onclick="restartGame()">🔄 Play Again (Same Room)</button>
            <button class="cartoon-btn btn-back" onclick="goHome()">Exit to Menu</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const WIDTH = 500;
    const HEIGHT = 707;
    canvas.width = WIDTH;
    canvas.height = HEIGHT;
    
    // ✅ FIX: Load image immediately for BOTH host and client
    const targetImage = new Image();
    targetImage.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgdmlld0JveD0iMCAwIDEwMCAxMDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGRlZnM+PHJhZGlhbEdyYWRpZW50IGlkPSJ0YXJnZXRHcmFkaWVudCIgY3g9IjUwJSIgY3k9IjUwJSIgcj0iNTAlIj48c3RvcCBvZmZzZXQ9IjAlIiBzdHlsZT0ic3RvcC1jb2xvcjojNWMzYTIxIi8+PHN0b3Agb2Zmc2V0PSIxMDAlIiBzdHlsZT0ic3RvcC1jb2xvcjojM2UyNzE2Ii8+PC9yYWRpYWxHcmFkaWVudD48cmFkaWFsR3JhZGllbnQgaWQ9ImhvbGVHcmFkaWVudCIgY3g9IjUwJSIgY3k9IjUwJSIgcj0iNTAlIj48c3RvcCBvZmZzZXQ9IjAlIiBzdHlsZT0ic3RvcC1jb2xvcjojMWEzYTM4Ii8+PHN0b3Agb2Zmc2V0PSI2MCUiIHN0eWxlPSJzdG9wLWNvbG9yOiMwYTFhMWEiLz48c3RvcCBvZmZzZXQ9IjEwMCUiIHN0eWxlPSJzdG9wLWNvbG9yOiMwMDAwMDAiLz48L3JhZGlhbEdyYWRpZW50PjwvZGVmcz48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI1MCIgZmlsbD0idXJsKCN0YXJnZXRHcmFkaWVudCkiLz48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0MCIgZmlsbD0idXJsKCNob2xlR3JhZGllbnQpIi8+PGNpcmNsZSBjeD0iNTAiIGN5PSI1MCIgcj0iMzUiIGZpbGw9Im5vbmUiIHN0cm9rZT0icmdiYSgyNTUsMjU1LDI1NSwwLjMpIiBzdHJva2Utd2lkdGg9IjMiLz48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSIyNSIgZmlsbD0ibm9uZSIgc3Ryb2tlPSJyZ2JhKDI1NSwyNTUsMjU1LDAuMSkiIHN0cm9rZS13aWR0aD0iMiIvPjwvc3ZnPg==';
    
    // ✅ FIX: Track image load status
    let imageLoaded = false;
    targetImage.onload = () => {
        imageLoaded = true;
        console.log('✅ Target image loaded successfully');
    };
    targetImage.onerror = () => {
        console.error('❌ Target image failed to load');
    };

    let gameState = {
        mode: 'local',
        isPlaying: false,
        turn: 1,
        scores: { 1: 0, 2: 0 },
        target: null,
        striker: { x: 0, y: 0, vx: 0, vy: 0, r: 20, moving: false },
        friction: 0.982,
        dragStart: null,
        dragCurrent: null,
        timer: 30,
        timerInterval: null,
        strikerStartPosition: { x: 0, y: 0 },
        computerThinking: false,
        lastScored: null
    };

    let peer = null;
    let conn = null;
    let myPlayerId = 1;
    let myRoomId = null;
    let isHost = false;

    const menuScreen = document.getElementById('menu-screen');
    const lobbyScreen = document.getElementById('lobby-screen');
    const gameContainer = document.getElementById('game-container');
    const gameOverScreen = document.getElementById('game-over-screen');
    const winModal = document.getElementById('win-modal');
    const warningToast = document.getElementById('warning-toast');

    function showScreen(screen) {
        [menuScreen, lobbyScreen, gameContainer, gameOverScreen].forEach(s => {
            if (s) s.classList.remove('active');
        });
        if (screen) screen.classList.add('active');
    }

    function goHome() {
        stopGame();
        if (conn) conn.close();
        if (peer) peer.destroy();
        conn = null;
        peer = null;
        myRoomId = null;
        showScreen(menuScreen);
        winModal.classList.remove('active');
    }

    function showLobby() {
        showScreen(lobbyScreen);
        document.getElementById('create-result').style.display = 'none';
        document.getElementById('join-status').innerText = '';
        document.getElementById('host-status').innerText = 'Waiting for player...';
        document.getElementById('join-id-input').value = '';
        document.getElementById('btn-create').disabled = false;
        document.getElementById('btn-create').innerText = "🏠 Create Room";
    }

    function startGame(mode) {
        gameState.mode = mode;
        gameState.scores = { 1: 0, 2: 0 };
        gameState.turn = 1;
        gameState.isPlaying = true;
        gameState.timer = 30;
        gameState.computerThinking = false;
        gameState.lastScored = null;
        
        showScreen(null);
        gameContainer.classList.add('active');
        
        if(mode === 'online') {
            document.getElementById('online-ui').classList.remove('hidden');
        } else {
            document.getElementById('online-ui').classList.add('hidden');
        }

        startTimer();
        resetTurn();
        gameLoop();
    }

    function stopGame() {
        gameState.isPlaying = false;
        stopTimer();
    }

    function startTimer() {
        stopTimer();
        gameState.timer = 30;
        updateTimerDisplay();
        
        gameState.timerInterval = setInterval(() => {
            if (!gameState.isPlaying) {
                stopTimer();
                return;
            }
            
            gameState.timer--;
            updateTimerDisplay();
            
            if (gameState.timer <= 10) {
                document.getElementById('timer-display').classList.add('timer-warning');
            } else {
                document.getElementById('timer-display').classList.remove('timer-warning');
            }
            
            if (gameState.timer <= 0) {
                switchTurn();
            }
        }, 1000);
    }

    function stopTimer() {
        if (gameState.timerInterval) {
            clearInterval(gameState.timerInterval);
            gameState.timerInterval = null;
        }
    }

    function updateTimerDisplay() {
        const timerEl = document.getElementById('timer-display');
        timerEl.innerText = gameState.timer;
        if (gameState.timer <= 10) {
            timerEl.classList.add('timer-warning');
        } else {
            timerEl.classList.remove('timer-warning');
        }
    }

    function resetTimer() {
        gameState.timer = 30;
        updateTimerDisplay();
    }

    function resetTurn() {
        gameState.striker.moving = false;
        gameState.striker.vx = 0;
        gameState.striker.vy = 0;
        
        gameState.strikerStartPosition = { x: WIDTH / 2, y: HEIGHT - 70 };
        gameState.striker.x = gameState.strikerStartPosition.x;
        gameState.striker.y = gameState.strikerStartPosition.y;

        if (gameState.mode === 'online' && isHost) {
            spawnTarget();
            sendTarget();
        } else if (gameState.mode === 'online') {
            // ✅ FIX: Client waits for host to send target
            gameState.target = null;
        } else {
            spawnTarget();
        }
        
        updateUI();
        resetTimer();
        
        if (gameState.mode === 'computer' && gameState.turn === 2) {
            gameState.computerThinking = true;
            updateUI();
            setTimeout(() => {
                if (gameState.isPlaying && gameState.turn === 2) {
                    computerAI();
                }
            }, 1000);
        }
    }

    function spawnTarget() {
        const marginX = 80;
        const marginY = 90;
        const maxY = HEIGHT * 0.75;
        
        let targetX, targetY, valid;
        let attempts = 0;
        
        do {
            valid = true;
            targetX = marginX + Math.random() * (WIDTH - marginX * 2);
            targetY = marginY + Math.random() * (maxY - marginY);
            
            const distFromStart = Math.sqrt(
                Math.pow(targetX - gameState.strikerStartPosition.x, 2) + 
                Math.pow(targetY - gameState.strikerStartPosition.y, 2)
            );
            if (distFromStart < 180) valid = false;
            
            attempts++;
        } while (!valid && attempts < 50);
        
        gameState.target = {
            x: valid ? targetX : WIDTH / 2,
            y: valid ? targetY : HEIGHT * 0.35,
            r: 35,
            image: targetImage, // ✅ Both host and client use same local image
            hit: false
        };
    }

    function updatePhysics() {
        const s = gameState.striker;

        if (s.moving) {
            s.x += s.vx;
            s.y += s.vy;
            s.vx *= gameState.friction;
            s.vy *= gameState.friction;

            if (s.x - s.r < 0) { s.x = s.r; s.vx *= -0.7; }
            if (s.x + s.r > WIDTH) { s.x = WIDTH - s.r; s.vx *= -0.7; }
            if (s.y - s.r < 0) { s.y = s.r; s.vy *= -0.7; }
            if (s.y + s.r > HEIGHT) { s.y = HEIGHT - s.r; s.vy *= -0.7; }

            if (Math.abs(s.vx) < 0.08 && Math.abs(s.vy) < 0.08) {
                s.vx = 0; s.vy = 0; s.moving = false;
                checkTargetTouch();
            }
        }
    }

    function checkTargetTouch() {
        const s = gameState.striker;
        
        if (gameState.target && !gameState.target.hit) {
            const dx = s.x - gameState.target.x;
            const dy = s.y - gameState.target.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const collisionDist = s.r + gameState.target.r * 0.7;
            
            if (dist < collisionDist) {
                gameState.target.hit = true;
                showPocketEffect(gameState.target.x, gameState.target.y);
                scorePoint(gameState.turn);
                setTimeout(() => { handleBonusShot(); }, 300);
                return;
            }
        }
        
        setTimeout(() => { switchTurn(); }, 500);
    }

    function handleBonusShot() {
        gameState.striker.x = gameState.strikerStartPosition.x;
        gameState.striker.y = gameState.strikerStartPosition.y;
        gameState.striker.vx = 0;
        gameState.striker.vy = 0;
        gameState.striker.moving = false;
        
        gameState.lastScored = gameState.turn;
        setTimeout(() => { gameState.lastScored = null; }, 500);
        
        setTimeout(() => {
            if (gameState.isPlaying) {
                if (gameState.mode === 'online' && isHost) {
                    spawnTarget();
                    sendTarget();
                } else if (gameState.mode !== 'online') {
                    spawnTarget();
                }
                resetTimer();
                
                if (gameState.mode === 'computer' && gameState.turn === 2) {
                    gameState.computerThinking = true;
                    updateUI();
                    setTimeout(() => {
                        if (gameState.isPlaying && gameState.turn === 2) {
                            computerAI();
                        }
                    }, 800);
                }
            }
        }, 400);
    }

    function showPocketEffect(x, y) {
        const effect = document.createElement('div');
        effect.className = 'pocket-effect';
        effect.style.width = '70px';
        effect.style.height = '70px';
        effect.style.left = (canvas.offsetLeft + x - 35) + 'px';
        effect.style.top = (canvas.offsetTop + y - 35) + 'px';
        effect.style.background = 'radial-gradient(circle, #fff 0%, #fca311 50%, transparent 70%)';
        document.getElementById('game-container').appendChild(effect);
        setTimeout(() => { effect.remove(); }, 300);
    }

    function scorePoint(player) {
        gameState.scores[player]++;
        checkWinCondition();
        updateUI();
        
        if(gameState.mode === 'online' && conn) {
            conn.send({ type: 'score', player: player, scores: gameState.scores, keepTurn: true });
        }
    }

    function switchTurn() {
        stopTimer();
        gameState.turn = gameState.turn === 1 ? 2 : 1;
        gameState.computerThinking = false;
        gameState.lastScored = null;
        resetTurn();
    }

    function checkWinCondition() {
        if (gameState.scores[1] >= 5 || gameState.scores[2] >= 5) {
            let winner = gameState.scores[1] >= 5 ? "Player 1" : "Player 2";
            if(gameState.mode === 'computer') {
                winner = gameState.scores[1] >= 5 ? "You" : "Computer";
            }
            if(gameState.mode === 'online') {
                winner = myPlayerId === 1 ? (gameState.scores[1] >= 5 ? "You" : "Opponent") : (gameState.scores[2] >= 5 ? "You" : "Opponent");
            }
            document.getElementById('winner-text').innerText = winner + " WINS!";
            document.getElementById('winner-name').innerText = winner + " Wins!";
            gameOverScreen.classList.add('active');
            winModal.classList.add('active');
            gameState.isPlaying = false;
            stopTimer();
            
            if(gameState.mode === 'online' && conn) {
                conn.send({ type: 'win', winner: gameState.scores[1] >= 5 ? 1 : 2 });
            }
        }
    }

    function computerAI() {
        if(!gameState.isPlaying || gameState.turn !== 2) return;
        const s = gameState.striker;
        if (!gameState.target) return;
        
        const angle = Math.atan2(gameState.target.y - s.y, gameState.target.x - s.x);
        const accuracy = 0.15 + (gameState.scores[2] * 0.02);
        const randomAngle = angle + (Math.random() - 0.5) * accuracy;
        const distance = Math.sqrt(Math.pow(gameState.target.x - s.x, 2) + Math.pow(gameState.target.y - s.y, 2));
        const power = Math.min(12 + Math.random() * 6 + (distance / 100), 22);
        
        s.vx = Math.cos(randomAngle) * power;
        s.vy = Math.sin(randomAngle) * power;
        s.moving = true;
        gameState.computerThinking = false;
        updateUI();
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX = e.clientX, clientY = e.clientY;
        if(e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        }
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    }

    function handleStart(e) {
        if (!gameState.isPlaying || gameState.striker.moving) return;
        if (gameState.mode === 'computer' && gameState.turn === 2) return;
        if (gameState.mode === 'online' && gameState.turn !== myPlayerId) return;
        if (gameState.computerThinking) return;

        const pos = getPos(e);
        const dist = Math.sqrt((pos.x - gameState.striker.x)**2 + (pos.y - gameState.striker.y)**2);
        if (dist < 70) {
            gameState.dragStart = { x: gameState.striker.x, y: gameState.striker.y };
            gameState.dragCurrent = pos;
        }
    }

    function handleMove(e) {
        if (!gameState.dragStart) return;
        gameState.dragCurrent = getPos(e);
    }

    function handleEnd(e) {
        if (!gameState.dragStart) return;
        const dx = gameState.dragStart.x - gameState.dragCurrent.x;
        const dy = gameState.dragStart.y - gameState.dragCurrent.y;
        const power = Math.min(Math.sqrt(dx*dx + dy*dy), 150) * 0.16;
        const angle = Math.atan2(dy, dx);

        gameState.striker.vx = Math.cos(angle) * power;
        gameState.striker.vy = Math.sin(angle) * power;
        gameState.striker.moving = true;
        gameState.dragStart = null;
        gameState.dragCurrent = null;

        if(gameState.mode === 'online' && conn) {
            conn.send({ type: 'move', vx: gameState.striker.vx, vy: gameState.striker.vy, startX: gameState.striker.x, startY: gameState.striker.y });
        }
    }

    canvas.addEventListener('mousedown', handleStart);
    canvas.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);
    canvas.addEventListener('touchstart', handleStart, {passive: false});
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, {passive: false});
    window.addEventListener('touchend', handleEnd);

    function draw() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);

        ctx.beginPath();
        ctx.arc(gameState.strikerStartPosition.x, gameState.strikerStartPosition.y, 30, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.lineWidth = 3;
        ctx.setLineDash([8, 6]);
        ctx.stroke();
        ctx.setLineDash([]);

        // ✅ FIX: Draw target with proper image handling for BOTH players
        if (gameState.target) {
            const target = gameState.target;
            const imgSize = target.r * 2.2;
            const imgX = target.x - imgSize / 2;
            const imgY = target.y - imgSize / 2;
            
            // ✅ Check if image is loaded before drawing
            if (imageLoaded && targetImage.complete && targetImage.naturalHeight !== 0) {
                ctx.globalAlpha = target.hit ? 0.3 : 1.0;
                ctx.drawImage(targetImage, imgX, imgY, imgSize, imgSize);
                ctx.globalAlpha = 1.0;
            } else {
                // ✅ Fallback: Draw canvas target if image not ready
                ctx.beginPath();
                ctx.arc(target.x, target.y, target.r, 0, Math.PI * 2);
                ctx.fillStyle = target.hit ? 'rgba(92, 58, 33, 0.3)' : '#5c3a21';
                ctx.fill();
                ctx.strokeStyle = target.hit ? 'rgba(62, 39, 22, 0.3)' : '#3e2716';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // Inner hole
                ctx.beginPath();
                ctx.arc(target.x, target.y, target.r * 0.7, 0, Math.PI * 2);
                ctx.fillStyle = '#1a1a1a';
                ctx.fill();
            }
            
            if (!target.hit) {
                ctx.beginPath();
                ctx.arc(target.x, target.y, target.r + 6, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(252, 163, 17, 0.6)';
                ctx.lineWidth = 2;
                ctx.setLineDash([6, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        ctx.beginPath();
        ctx.arc(gameState.striker.x, gameState.striker.y, gameState.striker.r, 0, Math.PI * 2);
        ctx.fillStyle = '#fca311';
        ctx.fill();
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(gameState.striker.x, gameState.striker.y, gameState.striker.r * 0.6, 0, Math.PI * 2);
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        if (gameState.lastScored === gameState.turn && !gameState.striker.moving) {
            ctx.save();
            ctx.shadowColor = '#fca311';
            ctx.shadowBlur = 25;
            ctx.beginPath();
            ctx.arc(gameState.striker.x, gameState.striker.y, gameState.striker.r + 6, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(252, 163, 17, 0.8)';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.restore();
        }

        if (gameState.dragStart && gameState.dragCurrent) {
            ctx.beginPath();
            ctx.moveTo(gameState.striker.x, gameState.striker.y);
            const dx = gameState.dragStart.x - gameState.dragCurrent.x;
            const dy = gameState.dragStart.y - gameState.dragCurrent.y;
            ctx.lineTo(gameState.striker.x + dx * 2, gameState.striker.y + dy * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.setLineDash([10, 8]);
            ctx.lineWidth = 5;
            ctx.stroke();
            ctx.setLineDash([]);
            const arrowLen = 18;
            const arrowAngle = Math.atan2(dy, dx);
            ctx.beginPath();
            ctx.moveTo(gameState.striker.x + dx * 2, gameState.striker.y + dy * 2);
            ctx.lineTo(gameState.striker.x + dx * 2 - arrowLen * Math.cos(arrowAngle - 0.5), gameState.striker.y + dy * 2 - arrowLen * Math.sin(arrowAngle - 0.5));
            ctx.moveTo(gameState.striker.x + dx * 2, gameState.striker.y + dy * 2);
            ctx.lineTo(gameState.striker.x + dx * 2 - arrowLen * Math.cos(arrowAngle + 0.5), gameState.striker.y + dy * 2 - arrowLen * Math.sin(arrowAngle + 0.5));
            ctx.stroke();
        }
    }

    function updateUI() {
        document.getElementById('p1-score').innerText = `P1: ${gameState.scores[1]}`;
        document.getElementById('p2-score').innerText = `P2: ${gameState.scores[2]}`;
        
        let turnText = gameState.turn === 1 ? "Player 1's Turn" : "Player 2's Turn";
        if(gameState.mode === 'computer') {
            if (gameState.turn === 2) {
                turnText = gameState.computerThinking ? "Computer Thinking<span class='thinking-dots'></span>" : "Computer's Turn";
            } else {
                turnText = "Your Turn";
            }
        }
        if(gameState.mode === 'online') {
            turnText = (gameState.turn === myPlayerId) ? "Your Turn" : "Opponent's Turn";
        }
        if (gameState.lastScored === gameState.turn) turnText += " 🔥 BONUS SHOT!";
        
        document.getElementById('turn-indicator').innerHTML = turnText;
        const turnEl = document.getElementById('turn-indicator');
        if (gameState.lastScored === gameState.turn) {
            turnEl.classList.add('bonus-flash');
            setTimeout(() => turnEl.classList.remove('bonus-flash'), 400);
        }
    }

    function gameLoop() {
        if (!gameState.isPlaying) return;
        updatePhysics();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // ==================== ONLINE CONNECTION LOGIC ====================
    
    function createRoom() {
        const btn = document.getElementById('btn-create');
        btn.disabled = true;
        btn.innerText = "Creating...";

        peer = new Peer(null, { debug: 2 });

        peer.on('open', (id) => {
            myRoomId = id;
            myPlayerId = 1;
            isHost = true;
            document.getElementById('create-result').style.display = 'block';
            document.getElementById('my-room-id').innerText = id;
            btn.disabled = false;
            btn.innerText = "🏠 Create Room";
            document.getElementById('host-status').innerText = "Waiting for player...";
        });

        peer.on('connection', (c) => {
            conn = c;
            setupConnection();
            document.getElementById('host-status').innerText = "Player Connected! Starting...";
            document.getElementById('host-status').style.color = "#00b894";
            setTimeout(() => { startGame('online'); }, 1000);
        });

        peer.on('error', (err) => {
            alert("Connection Error: " + err.type);
            btn.disabled = false;
            btn.innerText = "🏠 Create Room";
        });
    }

    function joinRoom() {
        const id = document.getElementById('join-id-input').value.trim();
        const status = document.getElementById('join-status');
        
        if (!id) { status.innerText = "Please enter a Room ID"; return; }
        status.innerText = "Connecting...";

        peer = new Peer(null, { debug: 2 });

        peer.on('open', () => {
            conn = peer.connect(id);
            myPlayerId = 2;
            isHost = false;
            
            conn.on('open', () => {
                setupConnection();
                status.innerText = "Connected! Starting...";
                status.style.color = "#00b894";
                setTimeout(() => { startGame('online'); }, 1000);
            });
            
            conn.on('error', () => {
                status.innerText = "Connection Failed. Check ID.";
                status.style.color = "#e74c3c";
            });
        });
        
        peer.on('error', (err) => {
            status.innerText = "Network Error.";
            status.style.color = "#e74c3c";
        });
    }

    function setupConnection() {
        conn.on('data', (data) => handleNetworkData(data));
        
        conn.on('close', () => {
            if(gameState.isPlaying) showToast("⚠️ Opponent disconnected!");
            goHome();
        });
        
        conn.on('error', (err) => {
            console.error("Connection error:", err);
            showToast("⚠️ Connection error!");
        });
    }

    function handleNetworkData(data) {
        switch(data.type) {
            case 'move':
                gameState.striker.x = data.startX;
                gameState.striker.y = data.startY;
                gameState.striker.vx = data.vx;
                gameState.striker.vy = data.vy;
                gameState.striker.moving = true;
                break;
                
            case 'score':
                gameState.scores = data.scores;
                if (!data.keepTurn) switchTurn();
                checkWinCondition();
                updateUI();
                break;
                
            case 'timer':
                gameState.timer = data.timer;
                updateTimerDisplay();
                break;
                
            case 'reset':
                gameState.striker.x = gameState.strikerStartPosition.x;
                gameState.striker.y = gameState.strikerStartPosition.y;
                gameState.striker.moving = false;
                gameState.striker.vx = 0;
                gameState.striker.vy = 0;
                break;
                
            // ✅ FIX: Client receives target data and attaches LOCAL image
            case 'target':
                gameState.target = {
                    x: data.target.x,
                    y: data.target.y,
                    r: data.target.r,
                    hit: data.target.hit,
                    image: targetImage // ✅ Attach local image reference
                };
                console.log('✅ Target received from host:', gameState.target);
                break;
                
            case 'win':
                endGame(data.winner);
                break;
                
            case 'restart':
                restartGame();
                break;
        }
    }

    function sendMove(vx, vy, startX, startY) {
        if (conn?.open) conn.send({ type: 'move', vx, vy, startX, startY });
    }

    function sendScore(player, scores, keepTurn) {
        if (conn?.open) conn.send({ type: 'score', player, scores, keepTurn });
    }

    function sendTimer(timer) {
        if (conn?.open) {
            conn.send({ type: 'timer', timer });
        }
    }

    // ✅ FIX: Send only target data (coordinates), not image reference
    function sendTarget() {
        if (conn?.open && isHost && gameState.target) {
            const targetData = {
                x: gameState.target.x,
                y: gameState.target.y,
                r: gameState.target.r,
                hit: gameState.target.hit
            };
            conn.send({ type: 'target', target: targetData });
            console.log('📤 Target sent to client:', targetData);
        }
    }

    function sendWin(winner) {
        if (conn?.open) conn.send({ type: 'win', winner });
    }

    function sendRestart() {
        if (conn?.open) conn.send({ type: 'restart' });
    }

    function copyRoomId() {
        if (!myRoomId) return showToast("No Room ID to copy!");
        navigator.clipboard.writeText(myRoomId).then(() => showToast("📋 Room ID copied!"));
    }

    async function shareRoomId() {
        if (!myRoomId) return showToast("No Room ID to share!");
        const text = `Join my Carrom Golf game! 🎱\nRoom ID: ${myRoomId}\n\nOpen the game and paste this ID to join!`;
        
        if (navigator.share) {
            try {
                await navigator.share({ title: 'Carrom Golf 1v1', text, url: window.location.href });
            } catch (err) { if (err.name !== 'AbortError') copyRoomId(); }
        } else {
            copyRoomId();
        }
    }

    function showToast(msg) {
        warningToast.innerText = msg;
        warningToast.style.display = 'block';
        setTimeout(() => { warningToast.style.display = 'none'; }, 2000);
    }

    function restartGame() {
        winModal.classList.remove('active');
        gameOverScreen.classList.remove('active');
        
        if (gameState.mode === 'online') {
            sendRestart();
        }
        
        gameState.scores = { 1: 0, 2: 0 };
        gameState.turn = 1;
        gameState.lastScored = null;
        resetTurn();
        gameState.isPlaying = true;
    }

    function endGame(winner) {
        gameState.isPlaying = false;
        stopTimer();
        let name = winner === myPlayerId ? "You" : "Opponent";
        document.getElementById('winner-name').innerText = `${name} Wins!`;
        winModal.classList.add('active');
    }

    setInterval(() => {
        if (gameState.mode === 'online' && gameState.isPlaying) sendTimer(gameState.timer);
    }, 1000);

</script>
