<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carrom Pocket 1v1</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root {
            --wood-color: #d4a373;
            --border-color: #5c3a21;
            --ui-bg: rgba(0, 0, 0, 0.8);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #menu-screen, #online-screen, #game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--ui-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
        }

        .hidden { display: none !important; }

        h1 { margin-bottom: 20px; font-size: 2rem; text-align: center; color: #fca311; }
        
        button {
            background: #fca311;
            border: none;
            padding: 15px 30px;
            margin: 10px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            width: 250px;
            font-weight: bold;
            color: #000;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }
        button.secondary { background: #666; color: white; }

        input {
            padding: 10px;
            font-size: 1.2rem;
            border-radius: 5px;
            border: none;
            margin-bottom: 10px;
            width: 250px;
            text-align: center;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background-color: var(--wood-color);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 15px solid var(--border-color);
            border-radius: 10px;
            max-width: 95vw;
            max-height: 95vh;
            aspect-ratio: 1 / 1.414; 
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: none;
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
            text-shadow: 2px 2px 0 #000;
        }

        #turn-indicator {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 1.2rem;
            text-shadow: 1px 1px 0 #000;
            pointer-events: none;
        }

        #timer-display {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 20px;
            color: #fca311;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000;
        }

        .timer-warning {
            color: #e63946 !important;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .online-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
            z-index: 20;
        }
        
        .icon-btn {
            width: 45px;
            height: 45px;
            padding: 0;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #333;
            color: white;
            border: 2px solid #fca311;
        }

        .icon-btn:active {
            background: #fca311;
            color: black;
        }

        #room-id-container {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }

        #room-id-text {
            font-size: 1.5rem;
            color: #fca311;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* Pocket animation */
        .pocket-effect {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #fca311 50%, transparent 70%);
            animation: pocketPop 0.3s ease-out;
            pointer-events: none;
        }

        @keyframes pocketPop {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* Computer thinking indicator */
        .thinking-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
    </style>
</head>
<body>

    <!-- MAIN MENU -->
    <div id="menu-screen">
        <h1>POCKET MASTER</h1>
        <button onclick="startGame('local')">Local 1vs1</button>
        <button onclick="startGame('computer')">Vs Computer</button>
        <button onclick="showOnlineMenu()">Online Mode</button>
    </div>

    <!-- ONLINE MENU -->
    <div id="online-screen" class="hidden">
        <h1>ONLINE MODE</h1>
        <button onclick="createRoom()">Create Room</button>
        
        <div id="room-id-container" class="hidden">
            <div style="color: white; margin-bottom: 10px;">Your Room ID:</div>
            <div id="room-id-text"></div>
            <div style="display: flex; justify-content: center; gap: 10px; margin-top: 15px;">
                <button class="icon-btn" onclick="copyRoomId()" title="Copy">📋</button>
                <button class="icon-btn" onclick="shareRoomId()" title="Share">📤</button>
            </div>
        </div>

        <div style="display:flex; flex-direction:column; align-items:center; margin-top: 20px;">
            <input type="text" id="room-id-input" placeholder="Enter Room ID">
            <button onclick="joinRoom()">Join Room</button>
        </div>
        <button class="secondary" onclick="showMainMenu()">Back</button>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="game-over-screen" class="hidden">
        <h1 id="winner-text">PLAYER 1 WINS!</h1>
        <button onclick="showMainMenu()">Main Menu</button>
    </div>

    <!-- GAME HUD -->
    <div id="game-container" class="hidden">
        <div class="online-controls hidden" id="online-ui">
            <button class="icon-btn" onclick="copyRoomId()" title="Copy ID">📋</button>
            <button class="icon-btn" onclick="shareRoomId()" title="Share ID">📤</button>
        </div>

        <div id="hud">
            <div id="p1-score">P1: 0</div>
            <div id="p2-score">P2: 0</div>
        </div>

        <div id="timer-display">30</div>
        <div id="turn-indicator">Player 1's Turn</div>
        
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
    /** 
     * GAME CONFIGURATION & STATE 
     */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Game State
    let gameState = {
        mode: 'local',
        isPlaying: false,
        turn: 1,
        scores: { 1: 0, 2: 0 },
        target: { x: 0, y: 0, r: 25, active: false },
        striker: { x: 0, y: 0, vx: 0, vy: 0, r: 18, moving: false },
        friction: 0.975,
        dragStart: null,
        dragCurrent: null,
        timer: 30,
        timerInterval: null,
        strikerStartPosition: { x: 0, y: 0 },
        computerThinking: false
    };

    // Online Networking
    let peer = null;
    let conn = null;
    let myPlayerId = 1;
    let currentRoomId = '';

    // Canvas Dimensions
    const WIDTH = 400;
    const HEIGHT = 566;
    canvas.width = WIDTH;
    canvas.height = HEIGHT;

    /**
     * INITIALIZATION
     */
    function showMainMenu() {
        stopGame();
        document.getElementById('menu-screen').classList.remove('hidden');
        document.getElementById('online-screen').classList.add('hidden');
        document.getElementById('game-over-screen').classList.add('hidden');
        document.getElementById('game-container').classList.add('hidden');
        if(peer) peer.destroy();
        peer = null;
        conn = null;
    }

    function showOnlineMenu() {
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('online-screen').classList.remove('hidden');
        document.getElementById('room-id-container').classList.add('hidden');
    }

    function startGame(mode) {
        gameState.mode = mode;
        gameState.scores = { 1: 0, 2: 0 };
        gameState.turn = 1;
        gameState.isPlaying = true;
        gameState.timer = 30;
        gameState.computerThinking = false;
        
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('online-screen').classList.add('hidden');
        document.getElementById('game-container').classList.remove('hidden');
        
        if(mode === 'online') {
            document.getElementById('online-ui').classList.remove('hidden');
        } else {
            document.getElementById('online-ui').classList.add('hidden');
        }

        startTimer();
        resetTurn();
        gameLoop();
    }

    function stopGame() {
        gameState.isPlaying = false;
        stopTimer();
    }

    /**
     * TIMER FUNCTIONALITY
     */
    function startTimer() {
        stopTimer();
        gameState.timer = 30;
        updateTimerDisplay();
        
        gameState.timerInterval = setInterval(() => {
            if (!gameState.isPlaying) {
                stopTimer();
                return;
            }
            
            // Only countdown if striker is not moving and not computer thinking
            if (!gameState.striker.moving && !gameState.computerThinking) {
                gameState.timer--;
                updateTimerDisplay();
                
                if (gameState.timer <= 10) {
                    document.getElementById('timer-display').classList.add('timer-warning');
                } else {
                    document.getElementById('timer-display').classList.remove('timer-warning');
                }
                
                if (gameState.timer <= 0) {
                    // Time's up! Switch turn
                    switchTurn();
                }
            }
        }, 1000);
    }

    function stopTimer() {
        if (gameState.timerInterval) {
            clearInterval(gameState.timerInterval);
            gameState.timerInterval = null;
        }
    }

    function updateTimerDisplay() {
        const timerEl = document.getElementById('timer-display');
        timerEl.innerText = gameState.timer;
        if (gameState.timer <= 10) {
            timerEl.classList.add('timer-warning');
        } else {
            timerEl.classList.remove('timer-warning');
        }
    }

    function resetTimer() {
        gameState.timer = 30;
        updateTimerDisplay();
    }

    /**
     * GAME LOGIC
     */
    function resetTurn() {
        gameState.striker.moving = false;
        gameState.striker.vx = 0;
        gameState.striker.vy = 0;
        
        // Set striker to starting position (bottom center)
        gameState.strikerStartPosition = { x: WIDTH / 2, y: HEIGHT - 50 };
        gameState.striker.x = gameState.strikerStartPosition.x;
        gameState.striker.y = gameState.strikerStartPosition.y;

        spawnTarget();
        updateUI();
        resetTimer();
        startTimer();
        
        // If computer's turn, trigger AI after delay
        if (gameState.mode === 'computer' && gameState.turn === 2) {
            gameState.computerThinking = true;
            updateUI();
            setTimeout(() => {
                if (gameState.isPlaying && gameState.turn === 2) {
                    computerAI();
                }
            }, 1000);
        }
    }

    function spawnTarget() {
        const margin = 60;
        gameState.target.x = margin + Math.random() * (WIDTH - margin * 2);
        gameState.target.y = margin + Math.random() * (HEIGHT / 2 - margin);
        gameState.target.active = true;
        gameState.target.r = 25;
    }

    function updatePhysics() {
        const s = gameState.striker;

        if (s.moving) {
            s.x += s.vx;
            s.y += s.vy;

            s.vx *= gameState.friction;
            s.vy *= gameState.friction;

            // Wall Collisions
            if (s.x - s.r < 0) { s.x = s.r; s.vx *= -0.7; }
            if (s.x + s.r > WIDTH) { s.x = WIDTH - s.r; s.vx *= -0.7; }
            if (s.y - s.r < 0) { s.y = s.r; s.vy *= -0.7; }
            if (s.y + s.r > HEIGHT) { s.y = HEIGHT - s.r; s.vy *= -0.7; }

            // Stop if too slow
            if (Math.abs(s.vx) < 0.15 && Math.abs(s.vy) < 0.15) {
                s.vx = 0; s.vy = 0; s.moving = false;
                handleTurnEnd();
            }

            // Target Collision - IMPROVED DETECTION
            if (gameState.target.active) {
                const dx = s.x - gameState.target.x;
                const dy = s.y - gameState.target.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const collisionDistance = s.r + gameState.target.r;

                if (dist < collisionDistance) {
                    // POCKETED! Reset striker immediately
                    scorePoint(gameState.turn);
                    gameState.target.active = false;
                    
                    // Immediately reset striker to starting position
                    resetStrikerToStart();
                }
            }
        }
    }

    function resetStrikerToStart() {
        // Stop the striker immediately
        gameState.striker.moving = false;
        gameState.striker.vx = 0;
        gameState.striker.vy = 0;
        
        // Reset to starting position
        gameState.striker.x = gameState.strikerStartPosition.x;
        gameState.striker.y = gameState.strikerStartPosition.y;
        
        // Show pocket effect
        showPocketEffect();
        
        // Spawn new target after brief delay and keep same turn
        setTimeout(() => {
            if (gameState.target.active === false && gameState.isPlaying) {
                spawnTarget();
                resetTimer();
                
                // If computer scored, let it play again
                if (gameState.mode === 'computer' && gameState.turn === 2) {
                    gameState.computerThinking = true;
                    updateUI();
                    setTimeout(() => {
                        if (gameState.isPlaying && gameState.turn === 2) {
                            computerAI();
                        }
                    }, 1000);
                }
            }
        }, 300);
    }

    function showPocketEffect() {
        const effect = document.createElement('div');
        effect.className = 'pocket-effect';
        effect.style.width = '60px';
        effect.style.height = '60px';
        effect.style.left = (canvas.offsetLeft + WIDTH/2 - 30) + 'px';
        effect.style.top = (canvas.offsetTop + HEIGHT/2 - 30) + 'px';
        document.getElementById('game-container').appendChild(effect);
        
        setTimeout(() => {
            effect.remove();
        }, 300);
    }

    function handleTurnEnd() {
        if (!gameState.target.active) {
            // Player already scored, striker already reset
            // Just wait for new target to spawn (handled in resetStrikerToStart)
        } else {
            // Missed, switch turn
            setTimeout(() => {
                switchTurn();
            }, 500);
        }
    }

    function scorePoint(player) {
        gameState.scores[player]++;
        checkWinCondition();
        updateUI();
        
        if(gameState.mode === 'online' && conn) {
            conn.send({ type: 'score', player: player, scores: gameState.scores });
        }
    }

    function switchTurn() {
        stopTimer();
        gameState.turn = gameState.turn === 1 ? 2 : 1;
        gameState.computerThinking = false;
        resetTurn();
    }

    function checkWinCondition() {
        if (gameState.scores[1] >= 5 || gameState.scores[2] >= 5) {
            let winner = gameState.scores[1] >= 5 ? "Player 1" : "Player 2";
            if(gameState.mode === 'computer') {
                winner = gameState.scores[1] >= 5 ? "You" : "Computer";
            }
            if(gameState.mode === 'online') {
                winner = myPlayerId === 1 ? (gameState.scores[1] >= 5 ? "You" : "Opponent") : (gameState.scores[2] >= 5 ? "You" : "Opponent");
            }
            document.getElementById('winner-text').innerText = winner + " WINS!";
            document.getElementById('game-over-screen').classList.remove('hidden');
            gameState.isPlaying = false;
            stopTimer();
        }
    }

    /**
     * COMPUTER AI - IMPROVED
     */
    function computerAI() {
        if(!gameState.isPlaying || gameState.turn !== 2) return;
        
        const s = gameState.striker;
        const t = gameState.target;
        
        // Calculate angle to target
        const angle = Math.atan2(t.y - s.y, t.x - s.x);
        
        // Add some randomness to make it beatable
        // Difficulty increases with computer score
        const accuracy = 0.15 + (gameState.scores[2] * 0.02); // More accurate as it scores
        const randomAngle = angle + (Math.random() - 0.5) * accuracy;
        
        // Power varies based on distance
        const distance = Math.sqrt(Math.pow(t.x - s.x, 2) + Math.pow(t.y - s.y, 2));
        const basePower = 12 + Math.random() * 5;
        const power = Math.min(basePower + (distance / 100), 20);
        
        s.vx = Math.cos(randomAngle) * power;
        s.vy = Math.sin(randomAngle) * power;
        s.moving = true;
        
        gameState.computerThinking = false;
        updateUI();
    }

    /**
     * INPUT HANDLING
     */
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        let clientX = e.clientX;
        let clientY = e.clientY;
        
        if(e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        }

        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    function handleStart(e) {
        if (!gameState.isPlaying || gameState.striker.moving) return;
        if (gameState.mode === 'computer' && gameState.turn === 2) return;
        if (gameState.mode === 'online' && gameState.turn !== myPlayerId) return;
        if (gameState.computerThinking) return;

        const pos = getPos(e);
        const dist = Math.sqrt((pos.x - gameState.striker.x)**2 + (pos.y - gameState.striker.y)**2);
        
        if (dist < 60) {
            gameState.dragStart = { x: gameState.striker.x, y: gameState.striker.y };
            gameState.dragCurrent = pos;
            stopTimer(); // Pause timer while aiming
        }
    }

    function handleMove(e) {
        if (!gameState.dragStart) return;
        gameState.dragCurrent = getPos(e);
    }

    function handleEnd(e) {
        if (!gameState.dragStart) return;
        
        const dx = gameState.dragStart.x - gameState.dragCurrent.x;
        const dy = gameState.dragStart.y - gameState.dragCurrent.y;
        
        const power = Math.min(Math.sqrt(dx*dx + dy*dy), 120) * 0.18;
        const angle = Math.atan2(dy, dx);

        gameState.striker.vx = Math.cos(angle) * power;
        gameState.striker.vy = Math.sin(angle) * power;
        gameState.striker.moving = true;

        gameState.dragStart = null;
        gameState.dragCurrent = null;

        startTimer(); // Resume timer after shot

        if(gameState.mode === 'online' && conn) {
            conn.send({
                type: 'move',
                vx: gameState.striker.vx,
                vy: gameState.striker.vy,
                startX: gameState.striker.x,
                startY: gameState.striker.y
            });
        }
    }

    canvas.addEventListener('mousedown', handleStart);
    canvas.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);

    canvas.addEventListener('touchstart', handleStart, {passive: false});
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, {passive: false});
    window.addEventListener('touchend', handleEnd);

    /**
     * RENDERING
     */
    function draw() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);

        // Draw Starting Position Marker
        ctx.beginPath();
        ctx.arc(gameState.strikerStartPosition.x, gameState.strikerStartPosition.y, 25, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.stroke();
        ctx.setLineDash([]);

        // Draw Target
        if (gameState.target.active) {
            ctx.beginPath();
            ctx.arc(gameState.target.x, gameState.target.y, gameState.target.r, 0, Math.PI * 2);
            ctx.fillStyle = '#e63946';
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(gameState.target.x, gameState.target.y, gameState.target.r * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.fill();

            // Outer ring
            ctx.beginPath();
            ctx.arc(gameState.target.x, gameState.target.y, gameState.target.r * 0.75, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // Draw Striker
        ctx.beginPath();
        ctx.arc(gameState.striker.x, gameState.striker.y, gameState.striker.r, 0, Math.PI * 2);
        ctx.fillStyle = '#fca311';
        ctx.fill();
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 3;
        ctx.stroke();

        // Striker detail
        ctx.beginPath();
        ctx.arc(gameState.striker.x, gameState.striker.y, gameState.striker.r * 0.6, 0, Math.PI * 2);
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Draw Aim Line
        if (gameState.dragStart && gameState.dragCurrent) {
            ctx.beginPath();
            ctx.moveTo(gameState.striker.x, gameState.striker.y);
            const dx = gameState.dragStart.x - gameState.dragCurrent.x;
            const dy = gameState.dragStart.y - gameState.dragCurrent.y;
            ctx.lineTo(gameState.striker.x + dx * 2, gameState.striker.y + dy * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.setLineDash([8, 8]);
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw arrow head
            const arrowLen = 15;
            const arrowAngle = Math.atan2(dy, dx);
            ctx.beginPath();
            ctx.moveTo(gameState.striker.x + dx * 2, gameState.striker.y + dy * 2);
            ctx.lineTo(
                gameState.striker.x + dx * 2 - arrowLen * Math.cos(arrowAngle - 0.5),
                gameState.striker.y + dy * 2 - arrowLen * Math.sin(arrowAngle - 0.5)
            );
            ctx.moveTo(gameState.striker.x + dx * 2, gameState.striker.y + dy * 2);
            ctx.lineTo(
                gameState.striker.x + dx * 2 - arrowLen * Math.cos(arrowAngle + 0.5),
                gameState.striker.y + dy * 2 - arrowLen * Math.sin(arrowAngle + 0.5)
            );
            ctx.stroke();
        }
    }

    function updateUI() {
        document.getElementById('p1-score').innerText = `P1: ${gameState.scores[1]}`;
        document.getElementById('p2-score').innerText = `P2: ${gameState.scores[2]}`;
        
        let turnText = gameState.turn === 1 ? "Player 1's Turn" : "Player 2's Turn";
        
        if(gameState.mode === 'computer') {
            if (gameState.turn === 2) {
                if (gameState.computerThinking) {
                    turnText = "Computer Thinking<span class='thinking-dots'></span>";
                } else {
                    turnText = "Computer's Turn";
                }
            } else {
                turnText = "Your Turn";
            }
        }
        
        if(gameState.mode === 'online') {
            turnText = (gameState.turn === myPlayerId) ? "Your Turn" : "Opponent's Turn";
        }
        
        document.getElementById('turn-indicator').innerText = turnText;
    }

    function gameLoop() {
        if (!gameState.isPlaying) return;
        updatePhysics();
        draw();
        requestAnimationFrame(gameLoop);
    }

    /**
     * ONLINE MODE LOGIC
     */
    function createRoom() {
        peer = new Peer();
        
        peer.on('open', (id) => {
            currentRoomId = id;
            document.getElementById('room-id-text').innerText = id;
            document.getElementById('room-id-container').classList.remove('hidden');
            myPlayerId = 1;
            
            peer.on('connection', (c) => {
                conn = c;
                setupConnection();
                startGame('online');
            });
        });

        peer.on('error', (err) => {
            alert("Connection Error: " + err.type);
        });
    }

    function joinRoom() {
        const roomId = document.getElementById('room-id-input').value.trim();
        if(!roomId) return alert("Please enter a Room ID");
        
        peer = new Peer();
        peer.on('open', () => {
            conn = peer.connect(roomId);
            myPlayerId = 2;
            
            conn.on('open', () => {
                setupConnection();
                startGame('online');
            });
            
            conn.on('error', (err) => alert("Connection Error: " + err));
        });

        peer.on('error', (err) => {
            alert("Could not connect. Check the Room ID.");
        });
    }

    function setupConnection() {
        conn.on('data', (data) => {
            if (data.type === 'move') {
                gameState.striker.x = data.startX;
                gameState.striker.y = data.startY;
                gameState.striker.vx = data.vx;
                gameState.striker.vy = data.vy;
                gameState.striker.moving = true;
            } else if (data.type === 'score') {
                gameState.scores = data.scores;
                checkWinCondition();
                updateUI();
            } else if (data.type === 'timer') {
                gameState.timer = data.timer;
                updateTimerDisplay();
            } else if (data.type === 'reset') {
                // Reset striker position when opponent scores
                gameState.striker.x = gameState.strikerStartPosition.x;
                gameState.striker.y = gameState.strikerStartPosition.y;
                gameState.striker.moving = false;
                gameState.striker.vx = 0;
                gameState.striker.vy = 0;
            }
        });
    }

    /**
     * SHARE & COPY FUNCTIONALITY
     */
    function copyRoomId() {
        const idToCopy = currentRoomId || document.getElementById('room-id-input').value.trim();
        if (!idToCopy) {
            alert("No Room ID to copy!");
            return;
        }
        
        navigator.clipboard.writeText(idToCopy).then(() => {
            alert("Room ID copied to clipboard! 📋");
        }).catch(() => {
            // Fallback for older browsers
            const textArea = document.createElement('textarea');
            textArea.value = idToCopy;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            alert("Room ID copied! 📋");
        });
    }

    async function shareRoomId() {
        const idToShare = currentRoomId || document.getElementById('room-id-input').value.trim();
        if (!idToShare) {
            alert("No Room ID to share!");
            return;
        }

        const shareData = {
            title: 'Join my Carrom Game!',
            text: `Join my Carrom Pocket game! Room ID: ${idToShare}`,
            url: window.location.href
        };

        if (navigator.share) {
            try {
                await navigator.share(shareData);
            } catch (err) {
                if (err.name !== 'AbortError') {
                    alert("Share failed. Try copying instead!");
                }
            }
        } else {
            // Fallback for browsers without Web Share API
            copyRoomId();
            alert("Web Share not supported. Room ID copied instead!");
        }
    }

    // Sync timer in online mode
    setInterval(() => {
        if (gameState.mode === 'online' && conn && !gameState.striker.moving && !gameState.computerThinking) {
            conn.send({ type: 'timer', timer: gameState.timer });
        }
    }, 1000);

</script>
</body>
</html>
